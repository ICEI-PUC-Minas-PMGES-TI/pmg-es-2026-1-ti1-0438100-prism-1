<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Benefícios</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Guia-Benefício</h1>
    <nav>   
      <button class="inicio">Início</button>
    </nav>
  </header>

  <div class="container">
    <h2>Benefícios Disponíveis</h2>
    <p>Veja o catálogo de benefícios disponíveis e clique para mais detalhes.</p>

    <div class="cards">

      <div class="card">
        <h3>Bolsa Família</h3>
        <p>Auxílio financeiro para famílias de baixa renda.</p>
        <button>Detalhes</button>
      </div>

      <div class="card">
        <h3>Auxílio Gás</h3>
        <p>Axuílio no custo do gás de cozinha.</p>
        <button>Detalhes</button>
      </div>

      <div class="card">
        <h3>INSS</h3>
        <p>Benefícios para aposentadoria e auxílio doença.</p>
        <button>Detalhes</button>
      </div>

    </div>
  </div>

</body>
</html>
